<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Asistente Reglamento</title>

    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

    <div class="container">

        <h1>Asistente Académico</h1>

        <!-- SUBIR PDF -->
        <h3>Subir PDF</h3>

        <input type="file" id="pdfFile" accept=".pdf">

        <button onclick="uploadPDF()">
            Cargar PDF
        </button>

        <div id="uploadStatus"></div>

        <hr>

        <!-- HACER PREGUNTAS -->
        <h3>Consultar documento</h3>

        <input
            type="text"
            id="question"
            placeholder="Haz una pregunta..."
        >

        <button onclick="askQuestion()">
            Enviar
        </button>

        <div id="response"></div>

        <div id="sources"></div>

    </div>

<script src="/static/script.js"></script>

</body>

</html>
