<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Asistente Académico IA</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/styles.css">

</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header class="app-header">

            <div class="hero-badge">
                AI • RAG • PDF Intelligence
            </div>

            <h1>
                Asistente Académico
            </h1>

            <p class="tagline">
                Consulta reglamentos y documentos mediante búsqueda semántica e inteligencia artificial.
            </p>

        </header>

        <div class="pdf-manager">
            <h2>📚 Documentos cargados</h2>

            <div id="pdfList"></div>
        </div>

        <!-- SUBIR PDF -->
        <section class="card">

            <div class="section-header">

                <h3 class="section-title">
                    <span class="step">01</span>
                    Cargar documento
                </h3>

                <span class="section-subtitle">
                    PDF académico
                </span>

            </div>

            <div class="file-row">

                <input type="file" id="pdfFile" accept=".pdf">

                <button onclick="uploadPDF()">
                    Cargar PDF
                </button>

            </div>

            <div id="uploadStatus"></div>

        </section>

        <!-- CONSULTA -->
        <section class="card">

            <div class="section-header">

                <h3 class="section-title">
                    <span class="step">02</span>
                    Consultar documento
                </h3>

                <span class="section-subtitle">
                    Preguntas inteligentes
                </span>

            </div>

            <div class="query-row">

                <input type="text" id="question"
                    placeholder="Ejemplo: ¿Cuáles son las causales de cancelación de semestre?">

                <button onclick="askQuestion()">
                    Consultar
                </button>

            </div>

            <!-- RESPUESTA -->
            <div class="response-wrapper">

                <div id="response"></div>

                <div id="sources"></div>

            </div>

        </section>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
